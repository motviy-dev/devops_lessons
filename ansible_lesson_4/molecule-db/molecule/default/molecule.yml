---
dependency:
  name: galaxy

driver:
  name: docker

platforms:
  - name: ubuntu
    image: geerlingguy/docker-ubuntu2204-ansible
    privileged: true
    command: sleep infinity

provisioner:
  name: ansible
  config_options:
    defaults:
      roles_path: /home/matyalol/molecule-db/roles
      remote_tmp: /tmp/.ansible/tmp

verifier:
  name: ansible

scenario:
  test_sequence:
    - destroy
    - syntax
    - create
    - converge
    - idempotence
    - verify
    - destroy